<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <script
      src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1"
      type="module"
    ></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sniglet:wght@400;800&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Unbounded:wght@200..900&family=Varela+Round&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="select-none bg-[rgb(22,22,30)] m-0">
    <!--NAV BAR-->
    <nav class="select-none sm:pt-2 fixed top-0 left-0 right-0 z-50">
      <div class="ml-auto max-w-7xl px-2 sm:px-6 lg:px-8">
        <div class="relative flex h-16 items-center justify-between">
          <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
            <!-- Mobile menu button-->
            <button
              type="button"
              command="--toggle"
              commandfor="mobile-menu"
              class="relative inline-flex items-center justify-center rounded-md p-2 text-gray-400 hover:bg-white/5 hover:text-white focus:outline-2 focus:-outline-offset-1 focus:outline-indigo-500"
            >
              <span class="absolute -inset-0.5"></span>
              <span class="sr-only">Open main menu</span>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                data-slot="icon"
                aria-hidden="true"
                class="size-6 in-aria-expanded:hidden"
              >
                <path
                  d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                data-slot="icon"
                aria-hidden="true"
                class="size-6 not-in-aria-expanded:hidden"
              >
                <path
                  d="M6 18 18 6M6 6l12 12"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <div
            class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-end"
          >
            <div class="hidden sm:ml-6 sm:block">
              <div class="flex space-x-4">
                <!-- Current: "bg-gray-950/50 text-white", Default: "text-gray-300 hover:bg-white/5 hover:text-white" -->
                <a
                  href="index.html"
                  class="text-[30px] rounded-md px-3 py-2 font-medium text-gray-300 hover:bg-white/5 hover:text-white tracking-wider"
                  >Home</a
                >
                <a
                  href="gallery.html"
                  aria-current="page"
                  class="text-[30px] rounded-md bg-gray-950/50 px-3 py-2 font-medium text-white tracking-wider"
                  >Gallery</a
                >
                <a
                  href="about.html"
                  class="text-[30px] rounded-md px-3 py-2 font-medium text-gray-300 hover:bg-white/5 hover:text-white tracking-wider"
                  >About</a
                >
              </div>
            </div>
          </div>
          <div
            class="absolute inset-y-0 right-0 flex items-center pr-2 sm:static sm:inset-auto sm:ml-6 sm:pr-0"
          ></div>
        </div>
      </div>

      <el-disclosure
        id="mobile-menu"
        hidden
        class="block sm:hidden bg-[rgb(22,22,30)]"
      >
        <div class="space-y-1 px-2 pt-2 pb-3">
          <a
            href="index.html"
            class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-white/5 hover:text-white"
            >Home</a
          >
          <a
            href="gallery.html"
            aria-current="page"
            class="block rounded-md bg-gray-950/50 px-3 py-2 text-base font-medium text-white"
            >Gallery</a
          >
          <a
            href="about.html"
            class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-white/5 hover:text-white"
            >About</a
          >
        </div>
      </el-disclosure>
    </nav>

    <!-- GALLERY -->
    <div class="w-full overflow-x-hidden">
      <div class="columns-2 md:columns-4 gap-4 mt-20 w-full">
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image.jpg"
            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-1.jpg"
            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-2.jpg"
            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"

            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-4.jpg"
            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-5.jpg"
            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-6.jpg"
            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-7.jpg"
            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-8.jpg"
            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-9.jpg"
            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-10.jpg"
            alt=""
          />
        </div>
        <div class="mb-4 break-inside-avoid">
          <img
            class="w-full h-auto rounded-base"
            src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-11.jpg"
            alt=""
          />
        </div>
      </div>
    </div>
    <!-- Lightbox -->
    <div id="lightbox" onclick="closeLightbox()">
      <img id="lightbox-img" src="" alt="" />
    </div>

    <script src="lightbox.js"></script>
  </body>
</html>
